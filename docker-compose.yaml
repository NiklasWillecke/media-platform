services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: example
    ports:
      - 5432:5432

  nats:
    image: nats:latest
    command: "-js -m 8222"
    ports:
      - "4222:4222" # NATS client connection
      - "8222:8222" # NATS monitoring API
