<!-- services/frontend/static/login.html -->
<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login – StreamingPlatform</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #0f0f0f;
                color: #fff;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }

            .card {
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                border-radius: 12px;
                padding: 40px;
                width: 100%;
                max-width: 400px;
            }

            .logo {
                font-size: 24px;
                font-weight: 700;
                color: #e50914;
                margin-bottom: 32px;
                text-align: center;
            }

            h1 {
                font-size: 20px;
                font-weight: 600;
                margin-bottom: 24px;
                color: #fff;
            }

            .form-group {
                margin-bottom: 16px;
            }

            label {
                display: block;
                font-size: 13px;
                color: #999;
                margin-bottom: 6px;
            }

            input {
                width: 100%;
                padding: 12px 16px;
                background: #2a2a2a;
                border: 1px solid #3a3a3a;
                border-radius: 8px;
                color: #fff;
                font-size: 15px;
                outline: none;
                transition: border-color 0.2s;
            }

            input:focus {
                border-color: #e50914;
            }

            .error {
                background: rgba(229, 9, 20, 0.1);
                border: 1px solid rgba(229, 9, 20, 0.3);
                border-radius: 8px;
                padding: 12px 16px;
                font-size: 14px;
                color: #ff6b6b;
                margin-bottom: 16px;
                display: none;
            }

            .error.visible {
                display: block;
            }

            button[type="submit"] {
                width: 100%;
                padding: 13px;
                background: #e50914;
                border: none;
                border-radius: 8px;
                color: #fff;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                margin-top: 8px;
                transition: background 0.2s;
            }

            button[type="submit"]:hover {
                background: #c4070f;
            }

            button[type="submit"]:disabled {
                background: #555;
                cursor: not-allowed;
            }

            .footer {
                text-align: center;
                margin-top: 24px;
                font-size: 14px;
                color: #666;
            }

            .footer a {
                color: #e50914;
                text-decoration: none;
            }

            .footer a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="logo">▶ StreamPlatform</div>
            <h1>Anmelden</h1>

            <div class="error" id="error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-Mail</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="name@example.com"
                        required
                        autocomplete="email"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Passwort</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    />
                </div>

                <button type="submit" id="submitBtn">Anmelden</button>
            </form>

            <div class="footer">
                Noch kein Konto?
                <a href="/register">Registrieren</a>
            </div>
        </div>

        <script src="api.js"></script>
        <script>
            document
                .getElementById("loginForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    const btn = document.getElementById("submitBtn");
                    const errorEl = document.getElementById("error");

                    const email = document.getElementById("email").value;
                    const password = document.getElementById("password").value;

                    btn.disabled = true;
                    btn.textContent = "Wird angemeldet...";
                    errorEl.classList.remove("visible");

                    try {
                        const { token } = await api.login(email, password);

                        // JWT im localStorage speichern
                        localStorage.setItem("token", token);

                        // Weiterleiten
                        window.location.href = "/";
                    } catch (err) {
                        errorEl.textContent = err.message;
                        errorEl.classList.add("visible");
                    } finally {
                        btn.disabled = false;
                        btn.textContent = "Anmelden";
                    }
                });
        </script>
    </body>
</html>
