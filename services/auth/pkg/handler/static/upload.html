<!-- services/frontend/static/upload.html -->
<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Upload – StreamingPlatform</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #0f0f0f;
                color: #fff;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 24px;
            }

            .card {
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                border-radius: 12px;
                padding: 40px;
                width: 100%;
                max-width: 500px;
            }

            .logo {
                font-size: 24px;
                font-weight: 700;
                color: #e50914;
                margin-bottom: 32px;
                text-align: center;
            }

            h1 {
                font-size: 20px;
                font-weight: 600;
                margin-bottom: 24px;
            }

            .tabs {
                display: flex;
                gap: 8px;
                margin-bottom: 24px;
            }

            .tab {
                flex: 1;
                padding: 10px;
                background: #2a2a2a;
                border: 1px solid #3a3a3a;
                border-radius: 8px;
                color: #999;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                text-align: center;
                transition:
                    background 0.2s,
                    color 0.2s,
                    border-color 0.2s;
            }

            .tab.active {
                background: rgba(229, 9, 20, 0.15);
                border-color: #e50914;
                color: #fff;
            }

            .tab:hover:not(.active) {
                background: #333;
                color: #ccc;
            }

            .drop-zone {
                border: 2px dashed #3a3a3a;
                border-radius: 10px;
                padding: 48px 24px;
                text-align: center;
                cursor: pointer;
                transition:
                    border-color 0.2s,
                    background 0.2s;
                margin-bottom: 20px;
                position: relative;
            }

            .drop-zone:hover,
            .drop-zone.drag-over {
                border-color: #e50914;
                background: rgba(229, 9, 20, 0.05);
            }

            .drop-zone input[type="file"] {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
                width: 100%;
                height: 100%;
            }

            .drop-icon {
                font-size: 40px;
                margin-bottom: 12px;
            }

            .drop-title {
                font-size: 15px;
                font-weight: 600;
                margin-bottom: 6px;
            }

            .drop-sub {
                font-size: 13px;
                color: #666;
            }

            .preview {
                display: none;
                margin-bottom: 20px;
                border-radius: 8px;
                overflow: hidden;
                background: #111;
                position: relative;
            }

            .preview.visible {
                display: block;
            }

            .preview img,
            .preview video {
                width: 100%;
                max-height: 260px;
                object-fit: contain;
                display: block;
            }

            .preview-remove {
                position: absolute;
                top: 8px;
                right: 8px;
                background: rgba(0, 0, 0, 0.7);
                border: none;
                border-radius: 50%;
                color: #fff;
                width: 28px;
                height: 28px;
                font-size: 16px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                line-height: 1;
            }

            .preview-remove:hover {
                background: #e50914;
            }

            .form-group {
                margin-bottom: 16px;
            }

            label {
                display: block;
                font-size: 13px;
                color: #999;
                margin-bottom: 6px;
            }

            input[type="text"],
            textarea {
                width: 100%;
                padding: 12px 16px;
                background: #2a2a2a;
                border: 1px solid #3a3a3a;
                border-radius: 8px;
                color: #fff;
                font-size: 15px;
                outline: none;
                transition: border-color 0.2s;
                font-family: inherit;
            }

            input[type="text"]:focus,
            textarea:focus {
                border-color: #e50914;
            }

            textarea {
                resize: vertical;
                min-height: 80px;
            }

            .progress-wrap {
                display: none;
                margin-bottom: 16px;
            }

            .progress-wrap.visible {
                display: block;
            }

            .progress-label {
                display: flex;
                justify-content: space-between;
                font-size: 13px;
                color: #999;
                margin-bottom: 6px;
            }

            .progress-bar-bg {
                background: #2a2a2a;
                border-radius: 99px;
                height: 6px;
                overflow: hidden;
            }

            .progress-bar {
                height: 100%;
                background: #e50914;
                border-radius: 99px;
                width: 0%;
                transition: width 0.2s;
            }

            .error {
                background: rgba(229, 9, 20, 0.1);
                border: 1px solid rgba(229, 9, 20, 0.3);
                border-radius: 8px;
                padding: 12px 16px;
                font-size: 14px;
                color: #ff6b6b;
                margin-bottom: 16px;
                display: none;
            }

            .error.visible {
                display: block;
            }

            .success {
                background: rgba(34, 197, 94, 0.1);
                border: 1px solid rgba(34, 197, 94, 0.3);
                border-radius: 8px;
                padding: 12px 16px;
                font-size: 14px;
                color: #4ade80;
                margin-bottom: 16px;
                display: none;
            }

            .success.visible {
                display: block;
            }

            button[type="submit"] {
                width: 100%;
                padding: 13px;
                background: #e50914;
                border: none;
                border-radius: 8px;
                color: #fff;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                margin-top: 8px;
                transition: background 0.2s;
            }

            button[type="submit"]:hover {
                background: #c4070f;
            }

            button[type="submit"]:disabled {
                background: #555;
                cursor: not-allowed;
            }

            .footer {
                text-align: center;
                margin-top: 24px;
                font-size: 14px;
                color: #666;
            }

            .footer a {
                color: #e50914;
                text-decoration: none;
            }

            .footer a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="logo">▶ StreamPlatform</div>
            <h1>Datei hochladen</h1>

            <div class="error" id="error"></div>
            <div class="success" id="success"></div>

            <div class="tabs">
                <div class="tab active" data-type="image">🖼 Bild</div>
                <div class="tab" data-type="video">🎬 Video</div>
            </div>

            <form id="uploadForm">
                <div class="drop-zone" id="dropZone">
                    <input type="file" id="fileInput" accept="image/*" />
                    <div class="drop-icon" id="dropIcon">🖼</div>
                    <div class="drop-title" id="dropTitle">
                        Bild hierher ziehen
                    </div>
                    <div class="drop-sub">
                        oder klicken zum Auswählen · JPG, PNG, GIF, WEBP
                    </div>
                </div>

                <div class="preview" id="preview">
                    <button
                        type="button"
                        class="preview-remove"
                        id="previewRemove"
                        title="Entfernen"
                    >
                        ✕
                    </button>
                    <img id="previewImg" src="" alt="" />
                    <video id="previewVid" controls></video>
                </div>

                <div class="form-group">
                    <label for="title">Titel</label>
                    <input
                        type="text"
                        id="title"
                        placeholder="Titel eingeben"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="description">Beschreibung (optional)</label>
                    <textarea
                        id="description"
                        placeholder="Kurze Beschreibung..."
                    ></textarea>
                </div>

                <div class="progress-wrap" id="progressWrap">
                    <div class="progress-label">
                        <span>Wird hochgeladen...</span>
                        <span id="progressPct">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>

                <button type="submit" id="submitBtn">Hochladen</button>
            </form>

            <div class="footer">
                <a href="/">← Zurück zur Startseite</a>
            </div>
        </div>

        <script src="api.js"></script>
        <script>
            const ACCEPT = {
                image: {
                    mime: "image/*",
                    exts: "JPG, PNG, GIF, WEBP",
                    icon: "🖼",
                    label: "Bild hierher ziehen",
                    maxMB: 20,
                },
                video: {
                    mime: "video/*",
                    exts: "MP4, WEBM, MOV",
                    icon: "🎬",
                    label: "Video hierher ziehen",
                    maxMB: 500,
                },
            };

            let currentType = "image";
            let selectedFile = null;

            const tabs = document.querySelectorAll(".tab");
            const fileInput = document.getElementById("fileInput");
            const dropZone = document.getElementById("dropZone");
            const dropIcon = document.getElementById("dropIcon");
            const dropTitle = document.getElementById("dropTitle");
            const dropSub = dropZone.querySelector(".drop-sub");
            const preview = document.getElementById("preview");
            const previewImg = document.getElementById("previewImg");
            const previewVid = document.getElementById("previewVid");
            const previewRemove = document.getElementById("previewRemove");
            const errorEl = document.getElementById("error");
            const successEl = document.getElementById("success");
            const progressWrap = document.getElementById("progressWrap");
            const progressBar = document.getElementById("progressBar");
            const progressPct = document.getElementById("progressPct");
            const submitBtn = document.getElementById("submitBtn");

            // --- Tabs ---
            tabs.forEach((tab) => {
                tab.addEventListener("click", () => {
                    tabs.forEach((t) => t.classList.remove("active"));
                    tab.classList.add("active");
                    currentType = tab.dataset.type;
                    const cfg = ACCEPT[currentType];
                    fileInput.accept = cfg.mime;
                    dropIcon.textContent = cfg.icon;
                    dropTitle.textContent = cfg.label;
                    dropSub.textContent = `oder klicken zum Auswählen · ${cfg.exts}`;
                    clearFile();
                });
            });

            // --- Drag & Drop ---
            dropZone.addEventListener("dragover", (e) => {
                e.preventDefault();
                dropZone.classList.add("drag-over");
            });

            dropZone.addEventListener("dragleave", () => {
                dropZone.classList.remove("drag-over");
            });

            dropZone.addEventListener("drop", (e) => {
                e.preventDefault();
                dropZone.classList.remove("drag-over");
                const file = e.dataTransfer.files[0];
                if (file) handleFile(file);
            });

            fileInput.addEventListener("change", () => {
                if (fileInput.files[0]) handleFile(fileInput.files[0]);
            });

            previewRemove.addEventListener("click", clearFile);

            function handleFile(file) {
                hideMessages();
                const cfg = ACCEPT[currentType];
                const isCorrectType =
                    currentType === "image"
                        ? file.type.startsWith("image/")
                        : file.type.startsWith("video/");

                if (!isCorrectType) {
                    showError(
                        `Bitte nur ${currentType === "image" ? "Bilder" : "Videos"} auswählen.`,
                    );
                    return;
                }

                const maxBytes = cfg.maxMB * 1024 * 1024;
                if (file.size > maxBytes) {
                    showError(
                        `Datei zu groß. Maximal ${cfg.maxMB} MB erlaubt.`,
                    );
                    return;
                }

                selectedFile = file;
                const url = URL.createObjectURL(file);

                if (currentType === "image") {
                    previewImg.src = url;
                    previewImg.style.display = "block";
                    previewVid.style.display = "none";
                    previewVid.src = "";
                } else {
                    previewVid.src = url;
                    previewVid.style.display = "block";
                    previewImg.style.display = "none";
                    previewImg.src = "";
                }

                preview.classList.add("visible");
                dropZone.style.display = "none";
            }

            function clearFile() {
                selectedFile = null;
                fileInput.value = "";
                previewImg.src = "";
                previewVid.src = "";
                preview.classList.remove("visible");
                dropZone.style.display = "";
            }

            // --- Form submit ---
            document
                .getElementById("uploadForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    hideMessages();

                    if (!selectedFile) {
                        showError("Bitte eine Datei auswählen.");
                        return;
                    }

                    const title = document.getElementById("title").value.trim();
                    if (!title) {
                        showError("Bitte einen Titel eingeben.");
                        return;
                    }

                    const description = document
                        .getElementById("description")
                        .value.trim();

                    const formData = new FormData();
                    formData.append("file", selectedFile);
                    formData.append("title", title);
                    formData.append("description", description);
                    formData.append("type", currentType);

                    submitBtn.disabled = true;
                    progressWrap.classList.add("visible");
                    setProgress(0);

                    try {
                        await uploadWithProgress(
                            "/api/upload",
                            formData,
                            (pct) => setProgress(pct),
                        );

                        setProgress(100);
                        showSuccess("Datei erfolgreich hochgeladen!");
                        clearFile();
                        document.getElementById("title").value = "";
                        document.getElementById("description").value = "";
                    } catch (err) {
                        showError(err.message);
                    } finally {
                        submitBtn.disabled = false;
                        progressWrap.classList.remove("visible");
                    }
                });

            function uploadWithProgress(url, formData, onProgress) {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    const token = localStorage.getItem("token");

                    xhr.open("POST", url);
                    if (token)
                        xhr.setRequestHeader(
                            "Authorization",
                            `Bearer ${token}`,
                        );

                    xhr.upload.addEventListener("progress", (e) => {
                        if (e.lengthComputable) {
                            onProgress(Math.round((e.loaded / e.total) * 100));
                        }
                    });

                    xhr.addEventListener("load", () => {
                        if (xhr.status >= 200 && xhr.status < 300) {
                            resolve(JSON.parse(xhr.responseText));
                        } else {
                            try {
                                const body = JSON.parse(xhr.responseText);
                                reject(
                                    new Error(
                                        body.message ||
                                            "Upload fehlgeschlagen.",
                                    ),
                                );
                            } catch {
                                reject(new Error("Upload fehlgeschlagen."));
                            }
                        }
                    });

                    xhr.addEventListener("error", () =>
                        reject(new Error("Netzwerkfehler beim Upload.")),
                    );
                    xhr.send(formData);
                });
            }

            function setProgress(pct) {
                progressBar.style.width = `${pct}%`;
                progressPct.textContent = `${pct}%`;
            }

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.classList.add("visible");
            }

            function showSuccess(msg) {
                successEl.textContent = msg;
                successEl.classList.add("visible");
            }

            function hideMessages() {
                errorEl.classList.remove("visible");
                successEl.classList.remove("visible");
            }
        </script>
    </body>
</html>
